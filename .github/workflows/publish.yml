name: Publish to npm

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types:
      - completed

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - uses: JS-DevTools/npm-publish@v4
        with:
          provenance: true
